name: clang-format Check

on: [ pull_request ]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - 'src'
          - 'include'
          - 'example/src'
    steps:
      - uses: actions/checkout@v6
      - name: Run clang-format check
        uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: '22'
          check-path: ${{ matrix.path }}
