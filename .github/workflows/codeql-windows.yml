name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  analyze:
    name: Analyze w/ OpenSSL
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["cpp"]
        preset: ["lib-win-openssl"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{matrix.language}}
          queries: security-extended,security-and-quality
          trap-caching: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        run: cmake -B build/${{matrix.preset}} --preset ${{matrix.preset}}

      - name: Build library
        run: cmake --build build/${{matrix.preset}} --config Release

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          upload-database: false