name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  analyze:
    name: Analyze w/ OpenSSL
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        preset: ["lib-win-openssl"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: "cpp"
          queries: security-extended
          trap-caching: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        run: cmake -B build/${{matrix.preset}} --preset ${{matrix.preset}}

      - name: Build library
        run: cmake --build build/${{matrix.preset}} --config Release

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"
          upload: failure-only
          output: sarif-results

      - name: Filter out Mongoose alerts
        uses: advanced-security/filter-sarif@v1.1
        with:
          patterns: |
            -**/mongoose.c
            -**/mongoose.h
            -**/vendors/**
          input: sarif-results/cpp.sarif
          output: sarif-results/cpp.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/cpp.sarif
